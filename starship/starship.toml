# ╔══════════════════════════════════════════════════════════════════╗
# ║  Sakya Theme — Starship Prompt                                 ║
# ║  离四贪 · Parting from the Four Attachments                     ║
# ║                                                                ║
# ║  如黑唐卡——深色背景上，只有最必要的信息以金线显现。               ║
# ║                                                                ║
# ║  Switch variant: palette = "sakya_dorje" / "sakya_karpo"       ║
# ╚══════════════════════════════════════════════════════════════════╝

command_timeout = 1000
"$schema" = 'https://starship.rs/config-schema.json'

palette = 'sakya_dorje'

format = """
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# ── Directory — 金 (Gser) ──
# 你在哪里，最重要，唯一用金
[directory]
style = "bold peach"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " "
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ── Git branch — 石青蓝 (Ngonpo) ──
[git_branch]
symbol = " "
style = "sky"
format = "[·](subtext0) [$symbol$branch(:$remote_branch)]($style) "

# ── Git status — 石绿干净 / 朱砂脏 ──
[git_status]
style = "teal"
format = "[$all_status$ahead_behind]($style)"
conflicted = "[=$count](bold red) "
ahead = "[⇡$count](teal) "
behind = "[⇣$count](maroon) "
diverged = "[⇕⇡$ahead_count⇣$behind_count](maroon) "
untracked = "[?$count](subtext0) "
stashed = "[\\$$count](subtext1) "
modified = "[!$count](red) "
staged = "[+$count](teal) "
renamed = "[»$count](sky) "
deleted = "[✘$count](red) "

# ── Languages — 三级文字 (Dul-ba)，退让 ──
[nodejs]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[c]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[rust]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[golang]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[php]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[java]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[kotlin]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[haskell]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version]($style) "

[python]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$version(\\($virtualenv\\))]($style) "

# ── Conda ──
[conda]
symbol = " "
style = "subtext0"
format = "[·](subtext0) [$symbol$environment]($style) "
ignore_base = false

# ── Docker — 青金石 (Mutsmen) ──
[docker_context]
symbol = " "
style = "sapphire"
format = "[·](subtext0) [$symbol$context]($style) "

# ── Command duration — 铅丹橙，>= 1s 显示 ──
[cmd_duration]
style = "maroon"
min_time = 1_000
format = " [·](subtext0) [$duration]($style)"
show_milliseconds = false
show_notifications = true
min_time_to_notify = 45000

# ── Line break ──
[line_break]
disabled = false

# ── Character — 金线收尾 ──
[character]
disabled = false
success_symbol = "[❯](bold peach)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold teal)"
vimcmd_replace_one_symbol = "[❮](bold pink)"
vimcmd_replace_symbol = "[❮](bold pink)"
vimcmd_visual_symbol = "[❮](bold yellow)"

# ── Time — 不显示，保持简净 ──
[time]
disabled = true

# ── OS / Username — 不显示，去执着 ──
[os]
disabled = true

[username]
disabled = true

# ═══════════════════════════════════════════════════════════════════
# Palettes
# ═══════════════════════════════════════════════════════════════════

# Dorje (dark) — Vajrapani's blue-black — calibrated with Munsell data
[palettes.sakya_dorje]
rosewater  = "#EFE2BE"   # Karpo/铅白 (calibrated 3.75Y 9/2.5)
flamingo   = "#C4BCAE"   # Dri-med
pink       = "#C88090"   # Metok — lotus pink
mauve      = "#2B3560"   # Tsingkha — indigo
red        = "#BB4441"   # Mtshal — cinnabar (calibrated 6.25R 4.5/11)
maroon     = "#E85600"   # Likhri — minium (calibrated 0.5YR 5.5/15.5)
peach      = "#D2B450"   # Gser — 24K gold
yellow     = "#A09058"   # Serpo — Ratnasambhava ochre
green      = "#527559"   # Ljangkhu — malachite (calibrated 1.5G 4.5/3.7)
teal       = "#527559"   # Spangma — copper green (same mineral)
sky        = "#5B8AB8"   # Ngonpo — azurite blue
sapphire   = "#2F3B5B"   # Mutsmen — lapis lazuli (calibrated 6.25PB 2.5/4.5)
blue       = "#5B8AB8"   # Ngonpo
lavender   = "#46465C"   # Tsen-kha 2
text       = "#E8E0D4"   # Karpo — primary text
subtext1   = "#C4BCAE"   # Dri-med
subtext0   = "#9E978C"   # Dul-ba
overlay2   = "#7A7A94"
overlay1   = "#686882"
overlay0   = "#565670"
surface2   = "#46465C"
surface1   = "#36364A"
surface0   = "#262638"
base       = "#1B1B2A"   # Sa
mantle     = "#13131F"   # Drak
crust      = "#0C0C14"   # Shunyata
