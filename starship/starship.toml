yellow     = "#8A7840"   # Serpo — Ratnasambhava ochre (git)
green      = "#337548"   # Ljangkhu — malachite (languages)
teal       = "#2A6848"   # Spangma — copper green
sky        = "#2B5E92"   # Ngonpo — azurite blue
sapphire   = "#223860"   # Mutsmen — lapis lazuli
blue       = "#2B5E92"   # Ngonpo — azurite blue
lavender   = "#D0CEC2"   # Tsen-kha 1 — surface (time bg)
text       = "#2A2520"   # Karpo — primary text
