maroon     = "#BE3A34"   # Amitabha red
peach      = "#D2B450"   # Gser — 24K gold (directories)
yellow     = "#A09058"   # Serpo — Ratnasambhava ochre (git)
green      = "#4A8B5E"   # Ljangkhu — malachite (languages)
