# ╔══════════════════════════════════════════════════════════════════╗
# ║  Sakya Dorje (Dark) — Starship Prompt Theme                    ║
# ║                                                                ║
# ║  A contemplative color palette inspired by Sakya iconography.  ║
# ║  Gold ceremonial accents, lapis depths, malachite earth,       ║
# ║  and warm whites on a dark ground.                             ║
# ║                                                                ║
# ║  Usage:                                                        ║
# ║    Copy or symlink this file to ~/.config/starship.toml        ║
# ║    or set STARSHIP_CONFIG to point here.                       ║
# ╚══════════════════════════════════════════════════════════════════╝

# ---------------------------------------------------------------------------
# Palette — named colors referenced throughout the config
# ---------------------------------------------------------------------------
palette = "sakya_dorje"

[palettes.sakya_dorje]
gser      = "#D2B450"   # Gold — primary / important elements
ngonpo    = "#5B8AB8"   # Blue — directories, git info
ljangkhu  = "#4A8B5E"   # Green — success states
mtshal    = "#CC3B30"   # Red — errors, dirty state
karpo     = "#E8E0D4"   # Warm white — primary text
drimed    = "#C4BCAE"   # Secondary text
dulba     = "#9E978C"   # Tertiary / dimmed text
likhri    = "#D85A1E"   # Orange — versions, warnings
spangma   = "#3E7E56"   # Malachite — package info
mutsmen   = "#2E4878"   # Lapis — docker, cloud contexts
metok     = "#C88090"   # Pink — language versions
tsingkha  = "#2B3560"   # Indigo — subtle decorations

# ---------------------------------------------------------------------------
# Prompt format
# ---------------------------------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$package\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$time\
$character"""

# Second line starts with time + character
# (line_break separates the info line from the input line)

# ---------------------------------------------------------------------------
# Directory — gold, truncated to 3 levels
# ---------------------------------------------------------------------------
[directory]
style            = "bold gser"
truncation_length = 3
truncate_to_repo  = false
read_only        = " 🔒"
read_only_style  = "mtshal"

# ---------------------------------------------------------------------------
# Git branch — blue
# ---------------------------------------------------------------------------
[git_branch]
style  = "bold ngonpo"
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "

# ---------------------------------------------------------------------------
# Git status — green when clean, red when dirty
# ---------------------------------------------------------------------------
[git_status]
style      = "ljangkhu"
conflicted = "[=$count](bold mtshal) "
ahead      = "[⇡$count](ljangkhu) "
behind     = "[⇣$count](likhri) "
diverged   = "[⇕ ⇡$ahead_count ⇣$behind_count](likhri) "
untracked  = "[?$count](dulba) "
stashed    = "[\\$$count](drimed) "
modified   = "[!$count](mtshal) "
staged     = "[+$count](ljangkhu) "
renamed    = "[»$count](ngonpo) "
deleted    = "[✘$count](mtshal) "

# ---------------------------------------------------------------------------
# Character — gold on success, red on error
# ---------------------------------------------------------------------------
[character]
success_symbol = "[❯](bold gser)"
error_symbol   = "[❯](bold mtshal)"

# ---------------------------------------------------------------------------
# Command duration — tertiary / dimmed
# ---------------------------------------------------------------------------
[cmd_duration]
style              = "dulba"
min_time           = 2_000          # show if command takes >= 2s
format             = "took [$duration]($style) "
show_notifications = false

# ---------------------------------------------------------------------------
# Package version — malachite green
# ---------------------------------------------------------------------------
[package]
style  = "spangma"
symbol = "📦 "
format = "[$symbol$version]($style) "

# ---------------------------------------------------------------------------
# Language versions — pink (metok)
# ---------------------------------------------------------------------------
[nodejs]
style  = "metok"
symbol = " "
format = "[$symbol$version]($style) "

[python]
style  = "metok"
symbol = " "
format = "[$symbol$version( \\($virtualenv\\))]($style) "

[rust]
style  = "metok"
symbol = " "
format = "[$symbol$version]($style) "

[golang]
style  = "metok"
symbol = " "
format = "[$symbol$version]($style) "

# ---------------------------------------------------------------------------
# Docker context — lapis blue
# ---------------------------------------------------------------------------
[docker_context]
style  = "mutsmen"
symbol = " "
format = "[$symbol$context]($style) "

# ---------------------------------------------------------------------------
# Kubernetes — lapis blue
# ---------------------------------------------------------------------------
[kubernetes]
disabled = false
style    = "mutsmen"
symbol   = "☸ "
format   = "[$symbol$context(\\($namespace\\))]($style) "

# ---------------------------------------------------------------------------
# Time — dimmed / tertiary, shown on the input line
# ---------------------------------------------------------------------------
[time]
disabled   = false
style      = "dulba"
format     = "[$time]($style) "
time_format = "%H:%M"
