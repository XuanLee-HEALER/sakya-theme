<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B1B2A"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Three sacred stripes of Sakya -->
  <rect x="14" y="96" width="100" height="4" rx="2" fill="#BE3A34" opacity="0.9"/>
  <rect x="14" y="102" width="100" height="4" rx="2" fill="#E8E0D4" opacity="0.9"/>
  <rect x="14" y="108" width="100" height="4" rx="2" fill="#2E4878" opacity="0.9"/>
  <!-- Vajra/Dorje symbol - simplified diamond -->
  <g transform="translate(64,50)">
    <!-- Central diamond -->
    <path d="M0,-28 L16,0 L0,28 L-16,0 Z" fill="none" stroke="#D2B450" stroke-width="2.5" opacity="0.95"/>
    <!-- Inner diamond -->
    <path d="M0,-14 L8,0 L0,14 L-8,0 Z" fill="#D2B450" opacity="0.25"/>
    <!-- Center dot -->
    <circle r="3" fill="#D2B450" opacity="0.9"/>
    <!-- Top and bottom prongs -->
    <line x1="0" y1="-28" x2="0" y2="-36" stroke="#D2B450" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="28" x2="0" y2="36" stroke="#D2B450" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Side details -->
    <line x1="-16" y1="0" x2="-22" y2="0" stroke="#D2B450" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="16" y1="0" x2="22" y2="0" stroke="#D2B450" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
