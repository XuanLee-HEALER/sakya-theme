    <g transform="translate(28, 0)">
      <!-- 1: comment -->
      <text y="0" fill="#8A7840">// Sakya Monastery thangka color theme</text>
      <!-- 2: import -->
      <text y="22"><tspan fill="#A89030">import</tspan><tspan fill="#2A2520"> { </tspan><tspan fill="#6E6650">Thangka</tspan><tspan fill="#2A2520"> } </tspan><tspan fill="#A89030">from</tspan><tspan fill="#337548"> "./sakya"</tspan><tspan fill="#2A2520">;</tspan></text>
      <!-- 3: blank -->
      <!-- 4: interface -->
      <text y="66"><tspan fill="#A89030">interface</tspan><tspan fill="#6E6650"> Mandala</tspan><tspan fill="#2A2520"> {</tspan></text>
      <!-- 5 -->
      <text y="88"><tspan fill="#2A2520">  name</tspan><tspan fill="#2A6848">:</tspan><tspan fill="#6E6650"> string</tspan><tspan fill="#2A2520">;</tspan></text>
      <!-- 6 -->
      <text y="110"><tspan fill="#2A2520">  colors</tspan><tspan fill="#2A6848">:</tspan><tspan fill="#6E6650"> string</tspan><tspan fill="#2A2520">[];</tspan></text>
      <!-- 7 -->
      <text y="132"><tspan fill="#2A2520">  sacred</tspan><tspan fill="#2A6848">:</tspan><tspan fill="#6E6650"> boolean</tspan><tspan fill="#2A2520">;</tspan></text>
      <!-- 8 -->
      <text y="154" fill="#2A2520">}</text>
      <!-- 9: blank -->
      <!-- 10: function -->
      <text y="198"><tspan fill="#A89030">async function</tspan><tspan fill="#2B5E92"> paintThangka</tspan><tspan fill="#2A2520">(mandala</tspan><tspan fill="#2A6848">:</tspan><tspan fill="#6E6650"> Mandala</tspan><tspan fill="#2A2520">)</tspan><tspan fill="#2A6848">:</tspan><tspan fill="#6E6650"> Promise</tspan><tspan fill="#2A2520">&lt;</tspan><tspan fill="#6E6650">void</tspan><tspan fill="#2A2520">&gt; {</tspan></text>
      <!-- 11 -->
      <text y="220"><tspan fill="#2A2520">  </tspan><tspan fill="#A89030">const</tspan><tspan fill="#2A2520"> pigments </tspan><tspan fill="#2A6848">=</tspan><tspan fill="#A89030"> await</tspan><tspan fill="#2B5E92"> loadMineralPigments</tspan><tspan fill="#2A2520">();</tspan></text>
      <!-- 12 -->
      <text y="242"><tspan fill="#2A2520">  </tspan><tspan fill="#A89030">const</tspan><tspan fill="#2A2520"> gold </tspan><tspan fill="#2A6848">=</tspan><tspan fill="#B84E18"> 0xD4A825</tspan><tspan fill="#2A2520">; </tspan><tspan fill="#8A7840">// 24K pure gold</tspan></text>
      <!-- 13: blank -->
      <!-- 14: for -->
      <text y="286"><tspan fill="#2A2520">  </tspan><tspan fill="#A89030">for</tspan><tspan fill="#2A2520"> (</tspan><tspan fill="#A89030">const</tspan><tspan fill="#2A2520"> color </tspan><tspan fill="#A89030">of</tspan><tspan fill="#2A2520"> mandala.colors) {</tspan></text>
      <!-- 15: if -->
      <text y="308"><tspan fill="#2A2520">    </tspan><tspan fill="#A89030">if</tspan><tspan fill="#2A2520"> (color </tspan><tspan fill="#2A6848">===</tspan><tspan fill="#337548"> "gser"</tspan><tspan fill="#2A2520">) {</tspan></text>
      <!-- 16 -->
      <text y="330"><tspan fill="#2A2520">      </tspan><tspan fill="#2B5E92">applyGoldLeaf</tspan><tspan fill="#2A2520">(pigments, </tspan><tspan fill="#B84E18">true</tspan><tspan fill="#2A2520">);</tspan></text>
      <!-- 17 -->
      <text y="352"><tspan fill="#2A2520">    } </tspan><tspan fill="#A89030">else</tspan><tspan fill="#2A2520"> {</tspan></text>
      <!-- 18 -->
      <text y="374"><tspan fill="#2A2520">      </tspan><tspan fill="#2B5E92">blendPigment</tspan><tspan fill="#2A2520">(color, </tspan><tspan fill="#B84E18">0.85</tspan><tspan fill="#2A2520">);</tspan></text>
      <!-- 19 -->
      <text y="396" fill="#2A2520">    }</text>
      <!-- 20 -->
      <text y="418" fill="#2A2520">  }</text>
