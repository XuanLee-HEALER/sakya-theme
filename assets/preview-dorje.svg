<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'SF Mono','Cascadia Code',Consolas,monospace" font-size="13">
  <rect width="820" height="520" rx="10" fill="#1B1B2A"/>
  <rect width="820" height="36" rx="10" fill="#0C0C14"/>
  <rect y="26" width="820" height="10" fill="#0C0C14"/>
  <circle cx="20" cy="18" r="6" fill="#BB4441"/>
  <circle cx="38" cy="18" r="6" fill="#D2B450"/>
  <circle cx="56" cy="18" r="6" fill="#527559"/>
  <text x="410" y="22" fill="#9E978C" text-anchor="middle" font-size="12">theme-preview.ts — Sakya Dorje</text>

  <g transform="translate(24, 56)" font-size="13.5" xml:space="preserve">
    <g fill="#46465C">
      <text x="8" y="0" text-anchor="end"> 1</text>
      <text x="8" y="22" text-anchor="end"> 2</text>
      <text x="8" y="44" text-anchor="end"> 3</text>
      <text x="8" y="66" text-anchor="end"> 4</text>
      <text x="8" y="88" text-anchor="end"> 5</text>
      <text x="8" y="110" text-anchor="end"> 6</text>
      <text x="8" y="132" text-anchor="end"> 7</text>
      <text x="8" y="154" text-anchor="end"> 8</text>
      <text x="8" y="176" text-anchor="end"> 9</text>
      <text x="8" y="198" text-anchor="end">10</text>
      <text x="8" y="220" text-anchor="end">11</text>
      <text x="8" y="242" text-anchor="end">12</text>
      <text x="8" y="264" text-anchor="end">13</text>
      <text x="8" y="286" text-anchor="end">14</text>
      <text x="8" y="308" text-anchor="end">15</text>
      <text x="8" y="330" text-anchor="end">16</text>
      <text x="8" y="352" text-anchor="end">17</text>
      <text x="8" y="374" text-anchor="end">18</text>
      <text x="8" y="396" text-anchor="end">19</text>
      <text x="8" y="418" text-anchor="end">20</text>
    </g>

    <g transform="translate(28, 0)">
      <!-- 1: comment — Serpo #A09058 -->
      <text y="0" fill="#A09058">// Sakya Monastery thangka color theme</text>
      <!-- 2: import — Gser #D2B450 + Karpo #EFE2BE + Ljangkhu #527559 -->
      <text y="22"><tspan fill="#D2B450">import</tspan><tspan fill="#E8E0D4"> { </tspan><tspan fill="#EFE2BE">Thangka</tspan><tspan fill="#E8E0D4"> } </tspan><tspan fill="#D2B450">from</tspan><tspan fill="#527559"> "./sakya"</tspan><tspan fill="#E8E0D4">;</tspan></text>
      <!-- 4: interface -->
      <text y="66"><tspan fill="#D2B450">interface</tspan><tspan fill="#EFE2BE"> Mandala</tspan><tspan fill="#E8E0D4"> {</tspan></text>
      <!-- 5-7 -->
      <text y="88"><tspan fill="#E8E0D4">  name</tspan><tspan fill="#527559">:</tspan><tspan fill="#EFE2BE"> string</tspan><tspan fill="#E8E0D4">;</tspan></text>
      <text y="110"><tspan fill="#E8E0D4">  colors</tspan><tspan fill="#527559">:</tspan><tspan fill="#EFE2BE"> string</tspan><tspan fill="#E8E0D4">[];</tspan></text>
      <text y="132"><tspan fill="#E8E0D4">  sacred</tspan><tspan fill="#527559">:</tspan><tspan fill="#EFE2BE"> boolean</tspan><tspan fill="#E8E0D4">;</tspan></text>
      <!-- 8 -->
      <text y="154" fill="#E8E0D4">}</text>
      <!-- 10: function — Ngonpo #5B8AB8 -->
      <text y="198"><tspan fill="#D2B450">async function</tspan><tspan fill="#5B8AB8"> paintThangka</tspan><tspan fill="#E8E0D4">(mandala</tspan><tspan fill="#527559">:</tspan><tspan fill="#EFE2BE"> Mandala</tspan><tspan fill="#E8E0D4">)</tspan><tspan fill="#527559">:</tspan><tspan fill="#EFE2BE"> Promise</tspan><tspan fill="#E8E0D4">&lt;</tspan><tspan fill="#EFE2BE">void</tspan><tspan fill="#E8E0D4">&gt; {</tspan></text>
      <!-- 11 -->
      <text y="220"><tspan fill="#E8E0D4">  </tspan><tspan fill="#D2B450">const</tspan><tspan fill="#E8E0D4"> pigments </tspan><tspan fill="#527559">=</tspan><tspan fill="#D2B450"> await</tspan><tspan fill="#5B8AB8"> loadMineralPigments</tspan><tspan fill="#E8E0D4">();</tspan></text>
      <!-- 12: number — Likhri #E85600, comment — Serpo #A09058 -->
      <text y="242"><tspan fill="#E8E0D4">  </tspan><tspan fill="#D2B450">const</tspan><tspan fill="#E8E0D4"> gold </tspan><tspan fill="#527559">=</tspan><tspan fill="#E85600"> 0xD4A825</tspan><tspan fill="#E8E0D4">; </tspan><tspan fill="#A09058">// 24K pure gold</tspan></text>
      <!-- 14: for -->
      <text y="286"><tspan fill="#E8E0D4">  </tspan><tspan fill="#D2B450">for</tspan><tspan fill="#E8E0D4"> (</tspan><tspan fill="#D2B450">const</tspan><tspan fill="#E8E0D4"> color </tspan><tspan fill="#D2B450">of</tspan><tspan fill="#E8E0D4"> mandala.colors) {</tspan></text>
      <!-- 15: if + string -->
      <text y="308"><tspan fill="#E8E0D4">    </tspan><tspan fill="#D2B450">if</tspan><tspan fill="#E8E0D4"> (color </tspan><tspan fill="#527559">===</tspan><tspan fill="#527559"> "gser"</tspan><tspan fill="#E8E0D4">) {</tspan></text>
      <!-- 16: function call + boolean -->
      <text y="330"><tspan fill="#E8E0D4">      </tspan><tspan fill="#5B8AB8">applyGoldLeaf</tspan><tspan fill="#E8E0D4">(pigments, </tspan><tspan fill="#E85600">true</tspan><tspan fill="#E8E0D4">);</tspan></text>
      <!-- 17 -->
      <text y="352"><tspan fill="#E8E0D4">    } </tspan><tspan fill="#D2B450">else</tspan><tspan fill="#E8E0D4"> {</tspan></text>
      <!-- 18 -->
      <text y="374"><tspan fill="#E8E0D4">      </tspan><tspan fill="#5B8AB8">blendPigment</tspan><tspan fill="#E8E0D4">(color, </tspan><tspan fill="#E85600">0.85</tspan><tspan fill="#E8E0D4">);</tspan></text>
      <!-- 19-20 -->
      <text y="396" fill="#E8E0D4">    }</text>
      <text y="418" fill="#E8E0D4">  }</text>
    </g>
  </g>
</svg>
